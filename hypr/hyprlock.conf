general {
    grace = 5
    disable_loading_bar = false
    hide_cursor = false
}

background {
    monitor =
    path = ~/.config/Pictures/Wallpaper.jpeg
    blur_passes = 2
    blur_size = 6
    noise = 0.02
    contrast = 0.9
    brightness = 0.8
    vibrancy = 0.2
}

label {
    monitor =
    text = $TIME
    font_size = 80
    font_family = monospace
    color = rgba(207,234,226,0.9)
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$USER"
    font_size = 20
    color = rgba(127,181,181,0.8)
    position = 0, 20
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2

    outer_color = rgba(47,158,158,0.8)
    inner_color = rgba(26,31,28,0.6)
    font_color = rgba(207,234,226,1)

    rounding = 12

    position = 0, -80
    halign = center
    valign = center

    fade_on_empty = false
    placeholder_text = Enter password...
}
