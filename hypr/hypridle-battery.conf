general {
    lock_cmd = ~/.config/hypr/scripts/lock.sh
    before_sleep_cmd = ~/.config/hypr/scripts/lock.sh
}

# Keep behavior close to AC for consistent UX while still saving power.
# Lock after 3 minutes on battery.
listener {
    timeout = 180
    on-timeout = ~/.config/hypr/scripts/lock.sh
}

# DPMS-off disabled: can cause black-screen/no-resume on some NVIDIA setups.
