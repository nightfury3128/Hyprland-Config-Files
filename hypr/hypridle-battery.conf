general {
    lock_cmd = ~/.config/hypr/scripts/idle-lock-guard.sh
    before_sleep_cmd = ~/.config/hypr/scripts/idle-lock-guard.sh
    after_sleep_cmd = hyprctl dispatch dpms on
}

# Keep behavior close to AC for consistent UX while still saving power.
# Lock after 3 minutes on battery.
listener {
    timeout = 180
    on-timeout = ~/.config/hypr/scripts/idle-lock-guard.sh
}

# Turn screen off after 4 minutes on battery.
listener {
    timeout = 240
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}
